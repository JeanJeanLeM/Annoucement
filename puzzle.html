<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}

body{
  font-family:'Segoe UI',system-ui,sans-serif;
  background:#0f0f1a;
  color:#e8e8f0;
  min-height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
}

/* Scrollbars harmonisees avec la palette UI */
:root{
  --ui-scrollbar-track:#121b34;
  --ui-scrollbar-track-border:rgba(168,85,247,.16);
  --ui-scrollbar-thumb-top:#b56aff;
  --ui-scrollbar-thumb-bottom:#7358ff;
  --ui-scrollbar-thumb-border:#1a2242;
}
.guided-floating-panel,
#setup.creation-guided,
.ux-walk-stage-wrap,
.ux-walk-editor-body,
.ux-walk-viewport-screen > .ux-walk-stage{
  scrollbar-width:thin;
  scrollbar-color:rgba(168,85,247,.82) var(--ui-scrollbar-track);
}
.guided-floating-panel::-webkit-scrollbar,
#setup.creation-guided::-webkit-scrollbar,
.ux-walk-stage-wrap::-webkit-scrollbar,
.ux-walk-editor-body::-webkit-scrollbar,
.ux-walk-viewport-screen > .ux-walk-stage::-webkit-scrollbar{
  width:11px;
  height:11px;
}
.guided-floating-panel::-webkit-scrollbar-track,
#setup.creation-guided::-webkit-scrollbar-track,
.ux-walk-stage-wrap::-webkit-scrollbar-track,
.ux-walk-editor-body::-webkit-scrollbar-track,
.ux-walk-viewport-screen > .ux-walk-stage::-webkit-scrollbar-track{
  background:var(--ui-scrollbar-track);
  border-radius:999px;
  box-shadow:inset 0 0 0 1px var(--ui-scrollbar-track-border);
}
.guided-floating-panel::-webkit-scrollbar-thumb,
#setup.creation-guided::-webkit-scrollbar-thumb,
.ux-walk-stage-wrap::-webkit-scrollbar-thumb,
.ux-walk-editor-body::-webkit-scrollbar-thumb,
.ux-walk-viewport-screen > .ux-walk-stage::-webkit-scrollbar-thumb{
  background:linear-gradient(180deg,var(--ui-scrollbar-thumb-top),var(--ui-scrollbar-thumb-bottom));
  border-radius:999px;
  border:2px solid var(--ui-scrollbar-thumb-border);
}
.guided-floating-panel::-webkit-scrollbar-thumb:hover,
#setup.creation-guided::-webkit-scrollbar-thumb:hover,
.ux-walk-stage-wrap::-webkit-scrollbar-thumb:hover,
.ux-walk-editor-body::-webkit-scrollbar-thumb:hover,
.ux-walk-viewport-screen > .ux-walk-stage::-webkit-scrollbar-thumb:hover{
  background:linear-gradient(180deg,#c48dff,#8268ff);
}
.guided-floating-panel::-webkit-scrollbar-corner,
#setup.creation-guided::-webkit-scrollbar-corner,
.ux-walk-stage-wrap::-webkit-scrollbar-corner,
.ux-walk-editor-body::-webkit-scrollbar-corner,
.ux-walk-viewport-screen > .ux-walk-stage::-webkit-scrollbar-corner{
  background:var(--ui-scrollbar-track);
}

/* ── Partage chargé : écran d’accueil minimal ─────────── */
#shareGate{
  display:none;
  position:fixed;
  inset:0;
  z-index:260;
  background:#0b0b17;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  padding:24px 16px;
  text-align:center;
  gap:20px;
}
#shareGate.on{display:flex}
.share-gate-card{
  background:#16213e;
  border-radius:20px;
  padding:32px 28px;
  max-width:420px;
  width:100%;
  box-shadow:0 28px 80px rgba(0,0,0,.65);
  border:1px solid rgba(168,85,247,.2);
}
.share-gate-card p{color:#a0a0c0;font-size:.95rem;line-height:1.5}
#shareGateError{color:#f472b6;font-size:.9rem;min-height:1.2em}

/* ── Setup / créateur ─────────────────────────────────── */
#setup{
  background:#16213e;
  border-radius:20px;
  padding:28px 24px 32px;
  width:min(1080px,calc(100vw - 24px));
  max-width:calc(100vw - 24px);
  box-shadow:0 28px 80px rgba(0,0,0,.65);
  display:flex;
  flex-direction:column;
  gap:18px;
  align-self:center;
}
.setup-title-full{text-align:center;margin-bottom:2px;flex:1;min-width:0}
.setup-header-row{
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:14px;
  flex-wrap:wrap;
  margin-bottom:4px;
}
.setup-header-tools{display:flex;align-items:center;gap:10px;flex-shrink:0;flex-wrap:wrap;}
.lang-switch{display:inline-flex;gap:4px;align-items:center;}
.lang-switch .ux-device-btn{min-width:40px;padding:8px 10px;font-size:.72rem;}
.setup-mode-toggle{
  flex-shrink:0;
  font-size:.78rem!important;
  padding:10px 16px!important;
  min-width:0!important;
}
.guided-step-hint{
  font-size:.75rem;
  color:#8b8ba8;
  text-align:center;
  margin:-8px 0 4px;
  line-height:1.4;
}
.guided-nav-btn{
  display:none;
  flex-shrink:0;
  box-sizing:border-box;
  width:38px;
  height:38px;
  min-height:38px;
  border-radius:10px;
  border:1px solid rgba(168,85,247,.35);
  background:rgba(168,85,247,.12);
  color:#e8e8f0;
  font-size:1.35rem;
  font-weight:300;
  line-height:1;
  cursor:pointer;
  transition:background .15s,border-color .15s,transform .12s;
  padding:0;
}
.guided-nav-btn:hover:not(:disabled){
  background:rgba(168,85,247,.22);
  border-color:#a855f7;
}
.guided-nav-btn:active:not(:disabled){transform:scale(.96)}
.guided-nav-btn:disabled{
  opacity:.28;
  cursor:default;
}
#setup.creation-guided .guided-nav-btn{display:flex;align-items:center;justify-content:center}
.setup-previews-inner{
  display:flex;
  flex-direction:column;
  gap:18px;
  min-width:0;
  flex:1;
}
#setup.creation-guided{
  position:fixed;
  inset:0;
  width:100%;
  max-width:none;
  min-height:100vh;
  max-height:100vh;
  border-radius:0;
  z-index:55;
  overflow:auto;
  padding:22px 24px 20px;
  align-self:stretch;
}
#setup.creation-guided .setup-previews{
  position:static;
  top:auto;
  width:100%;
  max-width:760px;
  margin:0 auto;
}
#setup.creation-guided .setup-layout{
  grid-template-columns:1fr;
  max-width:min(720px,100%);
  margin:0 auto;
  width:100%;
}
#setup.creation-guided #builderStepsMount{
  display:none;
}
.guided-floating-panel{
  display:none;
  position:fixed;
  z-index:80;
  width:min(400px,calc(100vw - 28px));
  max-height:min(72vh,calc(100vh - 120px));
  overflow:auto;
  padding:16px 18px 18px;
  background:#1a1a32;
  border:1px solid rgba(168,85,247,.35);
  border-radius:16px;
  box-shadow:0 20px 50px rgba(0,0,0,.55),0 0 0 1px rgba(0,0,0,.2);
  transition:top .28s ease,left .28s ease,transform .28s ease,opacity .2s ease;
  pointer-events:auto;
}
.guided-floating-panel--dragging{
  transition:none!important;
  box-shadow:0 24px 56px rgba(0,0,0,.65),0 0 0 2px rgba(168,85,247,.42);
}
.guided-float-drag-bar{
  display:none;
  align-items:center;
  gap:8px;
  flex-wrap:wrap;
  padding:9px 12px;
  margin:-6px -14px 10px -14px;
  cursor:grab;
  user-select:none;
  -webkit-user-select:none;
  touch-action:none;
  background:rgba(168,85,247,.14);
  border-bottom:1px solid rgba(168,85,247,.25);
  font-size:.72rem;
  color:#b0b0d8;
  letter-spacing:.03em;
}
#setup.creation-guided .guided-float-drag-bar{display:flex}
.guided-float-drag-bar:active{cursor:grabbing}
.guided-float-drag-grip{
  width:18px;
  height:10px;
  background:repeating-linear-gradient(
    90deg,
    rgba(168,85,247,.55) 0 3px,
    transparent 3px 6px
  );
  border-radius:2px;
  flex-shrink:0;
  opacity:.85;
}
.guided-float-drag-hint{color:#6b6b8a;font-size:.65rem}
#setup.creation-guided .guided-floating-panel{display:block}
#setup.creation-uxwalk #builderStepsMount{display:none}
#setup.creation-uxwalk .guided-floating-panel{display:none}
#setup.creation-uxwalk{
  position:fixed;
  inset:0;
  width:100%;
  max-width:none;
  border-radius:0;
  z-index:55;
  min-height:100vh;
  max-height:100vh;
  overflow:hidden;
  box-sizing:border-box;
}
#setup.creation-uxwalk .setup-layout{
  display:block;
  flex:1;
  min-height:0;
  max-width:none;
  margin:0;
  width:100%;
}
#setup.creation-uxwalk .setup-previews,
#setup.creation-uxwalk .setup-customize{display:none!important}
#setup.creation-uxwalk .setup-header-row{
  justify-content:space-between;
  align-items:center;
  gap:10px;
}
.ux-device-switch{
  display:none;
  align-items:center;
  gap:6px;
  background:rgba(15,52,96,.45);
  border:1px solid rgba(168,85,247,.28);
  border-radius:12px;
  padding:4px;
}
#setup.creation-uxwalk .ux-device-switch{display:inline-flex}
.ux-device-btn{
  border:1px solid transparent;
  background:transparent;
  color:#9f9fc0;
  font-size:.72rem;
  font-weight:700;
  padding:7px 10px;
  border-radius:8px;
  cursor:pointer;
  transition:background .16s,border-color .16s,color .16s;
}
.ux-device-btn[aria-pressed="true"]{
  background:rgba(168,85,247,.2);
  border-color:rgba(168,85,247,.55);
  color:#ececff;
}
.ux-device-btn:hover{color:#ececff}
.ux-walk-shell{
  display:none;
  min-height:0;
  width:100%;
  padding:0 6px 10px;
  box-sizing:border-box;
}
#setup.creation-uxwalk .ux-walk-shell{
  display:grid;
  grid-template-columns:minmax(0,1fr) minmax(320px,390px);
  gap:14px;
  height:calc(100vh - 150px);
}
.ux-walk-shell-main{
  min-width:0;
  min-height:0;
  display:flex;
  align-items:stretch;
  gap:10px;
}
.ux-walk-side-nav{
  flex-shrink:0;
  align-self:center;
  width:48px;
  min-height:140px;
  border-radius:14px;
  border:1px solid rgba(168,85,247,.38);
  background:rgba(168,85,247,.14);
  color:#e8e8f0;
  font-size:2rem;
  font-weight:300;
  line-height:1;
  cursor:pointer;
  transition:background .15s,border-color .15s,transform .12s,opacity .15s;
}
.ux-walk-side-nav:hover:not(:disabled){
  background:rgba(168,85,247,.24);
  border-color:#a855f7;
}
.ux-walk-side-nav:active:not(:disabled){transform:scale(.96)}
.ux-walk-side-nav:disabled{opacity:.28;cursor:default}
.ux-walk-stage-wrap{
  flex:1;
  min-width:0;
  min-height:0;
  display:flex;
  align-items:flex-start;
  justify-content:center;
  overflow:auto;
  overflow-x:hidden;
  padding:10px 4px 12px;
}
.ux-walk-assembly{
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:8px;
  width:100%;
  min-width:0;
  justify-content:flex-start;
  padding-top:2px;
  padding-bottom:6px;
}
.ux-walk-chrome-band{
  font-size:.67rem;
  font-weight:800;
  letter-spacing:.1em;
  text-transform:uppercase;
  color:#7a7aa1;
  text-align:center;
  line-height:1.35;
  max-width:min(540px,96%);
}
.ux-walk-chrome-band strong{color:#b886ff;font-weight:800}
.ux-walk-viewport-package{
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:8px;
  width:100%;
}
.ux-walk-viewport-package[hidden]{display:none!important}
.ux-walk-viewport-bezel{
  position:relative;
  flex-shrink:0;
  width:min(360px,calc(100vw - 560px),calc((100vh - 220px) * 9 / 19.5));
  aspect-ratio:9/19.5;
  max-height:min(72vh,640px);
  padding:5px;
  border-radius:22px;
  background:linear-gradient(145deg,#2a2a3d,#12121c);
  box-shadow:
    0 0 0 1px rgba(255,255,255,.12),
    0 0 0 3px rgba(0,0,0,.55),
    inset 0 1px 0 rgba(255,255,255,.08),
    0 22px 50px rgba(0,0,0,.55);
}
.ux-walk-viewport-screen{
  position:relative;
  width:100%;
  height:100%;
  border-radius:14px;
  overflow:hidden;
  background:#0b0b17;
  box-shadow:inset 0 0 0 2px rgba(255,255,255,.16);
}
.ux-walk-viewport-screen::after{
  content:'';
  position:absolute;
  inset:0;
  border-radius:14px;
  pointer-events:none;
  box-shadow:inset 0 0 0 1px rgba(0,0,0,.45);
  z-index:50;
}
.ux-walk-viewport-foot{
  margin:0;
  font-size:.72rem;
  color:#77779a;
  text-align:center;
  line-height:1.4;
  max-width:min(560px,96%);
}
.ux-walk-outside-hint{
  margin:0;
  font-size:.72rem;
  color:#9a9ac2;
  text-align:center;
  line-height:1.42;
  max-width:min(560px,96%);
}
.ux-walk-outside-hint:empty{display:none}
.ux-walk-creator-only-zone{
  width:100%;
  max-width:620px;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  gap:14px;
}
.ux-walk-creator-only-zone[hidden]{display:none!important}
.ux-walk-creator-only-banner{
  font-size:.72rem;
  font-weight:800;
  letter-spacing:.08em;
  text-transform:uppercase;
  color:#ff8da0;
  text-align:center;
}
.ux-walk-viewport-screen > .ux-walk-stage{
  position:absolute;
  inset:0;
  width:100%;
  height:100%;
  margin:0;
  box-sizing:border-box;
  overflow:auto;
  z-index:1;
}
.ux-walk-stage{
  width:100%;
  max-width:100%;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:flex-start;
  gap:10px;
  padding:12px 8px;
}
.ux-walk-stage.is-centered{
  justify-content:center;
}
.ux-walk-stage[hidden]{display:none!important}
.ux-walk-live-hint{
  font-size:.72rem;
  color:#8b8ba8;
  text-align:center;
  line-height:1.45;
  margin:0;
}
.ux-walk-live-hint[hidden]{display:none!important}
.ux-walk-gate-body{
  margin:0;
  font-size:.95rem;
  line-height:1.5;
  color:#a0a0c0;
  max-width:100%;
  word-break:break-word;
}
.ux-walk-stage--gate .ux-walk-gate-card{
  width:min(92%,420px);
  margin:0 auto;
  text-align:center;
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:12px;
  padding:26px 22px;
}
.ux-walk-stage--gate .ux-walk-gate-card .step-lbl{
  margin-bottom:0!important;
}
.ux-walk-stage--gate .ux-walk-gate-body{
  width:100%;
  max-width:34ch;
  text-align:center;
  overflow-wrap:anywhere;
  word-break:break-word;
}
.ux-walk-stage--gate .ux-walk-fake-start{
  width:auto;
  min-width:170px;
  max-width:220px;
  margin-top:2px;
  align-self:center;
}
.ux-walk-fake-start{
  width:100%;
  display:inline-flex;
  align-items:center;
  justify-content:center;
  text-align:center;
  box-sizing:border-box;
  margin-top:10px;
  pointer-events:none;
  cursor:default;
  opacity:.95;
}
.ux-walk-photo-caption{
  text-align:center;
  margin:0;
  font-size:.65rem;
}
.ux-walk-photo-frame{
  position:relative;
  width:min(90%,260px);
  aspect-ratio:1;
  max-height:min(34vh,250px);
  border-radius:12px;
  overflow:hidden;
  border:1px solid rgba(168,85,247,.4);
  box-shadow:0 12px 30px rgba(0,0,0,.45);
  background:#12121f;
}
.ux-walk-photo-frame .mock-grid-overlay{
  position:absolute;
  inset:0;
  display:grid;
  gap:0;
  pointer-events:none;
  z-index:2;
}
.ux-walk-photo-img{
  position:absolute;
  inset:0;
  width:100%;
  height:100%;
  object-fit:cover;
  object-position:center;
  display:block;
}
.ux-walk-photo-img[hidden]{display:none!important}
.ux-walk-photo-ph{
  position:absolute;
  inset:0;
  z-index:1;
  display:flex;
  align-items:center;
  justify-content:center;
  text-align:center;
  padding:16px;
  color:#6a6a88;
  font-size:.82rem;
  line-height:1.4;
  background:rgba(18,18,31,.82);
}
.ux-walk-photo-ph[hidden]{display:none!important}
.ux-walk-crop-note{
  font-size:.66rem!important;
  line-height:1.4!important;
  color:#8b8ba8!important;
  text-align:center;
  max-width:min(92%,360px);
}
.ux-mock-game{
  width:100%;
  max-width:100%;
  flex:1;
  min-height:0;
  border-radius:12px;
  overflow:hidden;
  border:1px solid rgba(168,85,247,.22);
  background:#0b0b17;
  display:flex;
  flex-direction:column;
}
.ux-walk-stage--game.ux-walk-stage{justify-content:flex-start}
.ux-mock-game .mock-canvas{
  flex:1;
  min-height:72px;
}
.ux-mock-game .mock-crop-frame{
  width:min(94%,220px);
  max-height:min(34vh,220px);
}
.ux-mock-game .preview-crop-note{
  flex-shrink:0;
  padding:8px 10px 10px;
  margin:0;
}
.mock-win.ux-mock-win{
  width:100%;
  max-width:100%;
  flex:1;
  height:100%;
  min-height:100%;
  max-height:none;
  border-radius:0;
  border:0;
}
.ux-mock-win .preview-win-headline{
  font-size:clamp(1rem,3.8vw,1.7rem);
}
.ux-mock-win .mock-win-fake-btns .mock-fake{
  font-size:.76rem!important;
  padding:8px 14px!important;
}
.ux-walk-stage--win.ux-walk-stage{
  padding:0;
  gap:0;
}
.ux-walk-end-card{
  background:#16213e;
  border-radius:18px;
  padding:24px 20px;
  width:100%;
  max-width:460px;
  border:1px solid rgba(168,85,247,.22);
  box-shadow:0 14px 40px rgba(0,0,0,.45);
  text-align:center;
}
.ux-walk-end-card .field-hint{margin-bottom:14px;line-height:1.45}
.ux-walk-end-mock-btns{
  display:flex;
  flex-direction:column;
  gap:10px;
  pointer-events:none;
}
.ux-walk-end-mock-btns .mock-fake{
  font-size:.9rem!important;
  padding:12px 18px!important;
  cursor:default;
}
.ux-walk-editor{
  background:#121a34;
  border:1px solid rgba(168,85,247,.28);
  border-radius:16px;
  min-height:0;
  display:flex;
  flex-direction:column;
  overflow:hidden;
  box-shadow:0 14px 40px rgba(0,0,0,.45);
}
.ux-walk-editor-head{
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:10px;
  padding:12px 14px;
  border-bottom:1px solid rgba(168,85,247,.22);
  background:rgba(168,85,247,.08);
}
.ux-walk-editor-title{
  font-size:.82rem;
  font-weight:800;
  letter-spacing:.09em;
  text-transform:uppercase;
  color:#d7d7f4;
}
.ux-walk-editor-sub{
  font-size:.68rem;
  color:#8f8fb4;
}
.ux-walk-editor-body{
  flex:1;
  min-height:0;
  overflow:auto;
  padding:12px 14px 14px;
}
.ux-walk-editor-body .builder-step{
  margin:0;
}
#setup[data-ux-device="desktop"] .ux-walk-viewport-bezel{
  width:min(860px,calc(100vw - 560px),calc((100vh - 230px) * 16 / 10));
  aspect-ratio:16/10;
  max-height:min(70vh,560px);
  border-radius:14px;
  padding:6px;
}
#setup[data-ux-device="desktop"] .ux-walk-viewport-screen,
#setup[data-ux-device="desktop"] .ux-walk-viewport-screen::after{
  border-radius:9px;
}
#setup[data-ux-device="desktop"] .ux-walk-photo-frame{
  width:min(78%,420px);
  max-height:min(40vh,300px);
}
#setup[data-ux-device="desktop"] .ux-mock-game .mock-crop-frame{
  width:min(88%,340px);
  max-height:min(35vh,260px);
}
#setup[data-ux-device="desktop"] .ux-mock-win .preview-win-headline{
  font-size:clamp(1.2rem,2.8vw,2rem);
}
@media (max-width:1200px){
  #setup.creation-uxwalk .ux-walk-shell{
    grid-template-columns:1fr;

#btnCreate:hover:not(:disabled){transform:translateY(-2px);box-shadow:0 10px 32px rgba(233,69,96,.55)}
#btnCreate:active:not(:disabled){transform:none;box-shadow:0 4px 16px rgba(233,69,96,.4)}
#btnCreate:disabled{opacity:.32;cursor:default;box-shadow:none}

/* ── Game ─────────────────────────────────────────────── */
#game{
  display:none;
  position:fixed;inset:0;
  flex-direction:column;
  background:#0b0b17;
}
#toolbar{
  display:flex;align-items:center;gap:12px;
  padding:8px 14px;
  background:#12122a;
  border-bottom:1px solid rgba(168,85,247,.18);
  flex-shrink:0;z-index:5;
  flex-wrap:wrap;
  min-height:44px;
}
#toolbar h2{font-size:.9rem;font-weight:600;flex:1;min-width:60px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:#c0c0e0}
.hint{
  font-size:.7rem;color:#555;
  display:flex;align-items:center;gap:3px;
  white-space:nowrap;
}
kbd{
  background:#0f3460;border-radius:4px;
  padding:1px 6px;font-size:.67rem;
  color:#9090c0;font-family:monospace;
  border:1px solid rgba(168,85,247,.25);
}
#progress-wrap{
  width:90px;height:5px;
  background:rgba(255,255,255,.07);border-radius:3px;overflow:hidden;flex-shrink:0;
}
#progress{
  height:100%;width:0%;
  background:linear-gradient(90deg,#e94560,#a855f7);
  border-radius:3px;transition:width .4s;
}
#piece-count{font-size:.7rem;color:#555;white-space:nowrap;min-width:60px}
#btnRestart{
  background:rgba(168,85,247,.12);
  border:1px solid rgba(168,85,247,.25);
  border-radius:7px;padding:5px 11px;
  color:#9090b8;font-size:.78rem;cursor:pointer;
  transition:background .15s,color .15s;white-space:nowrap;
}
#btnRestart:hover{background:rgba(168,85,247,.28);color:#e8e8f0}

#canvas{
  flex:1;display:block;
  cursor:default;
  user-select:none;
  -webkit-user-select:none;
  -webkit-touch-callout:none;
  touch-action:none;
  /* dot grid via CSS – no JS draw cost */
  background-image:radial-gradient(rgba(168,85,247,.07) 1.5px, transparent 1.5px);
  background-size:40px 40px;
  background-position:20px 20px;
}

/* snap flash overlay drawn by JS */

/* ── Victoire : message géant + feux d’artifice ───────── */
#winCelebration{
  display:none;
  position:fixed;
  inset:0;
  z-index:100;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  pointer-events:none;
}
#winCelebration.on{display:flex}
#fireworksCanvas{
  position:absolute;
  inset:0;
  width:100%;
  height:100%;
  pointer-events:none;
  background:radial-gradient(ellipse at 50% 120%,rgba(20,10,40,.5),transparent 55%);
}
.win-celebration-inner{
  position:relative;
  z-index:2;
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:clamp(20px,4vh,40px);
  max-width:min(96vw,920px);
  padding:12px;
  pointer-events:none;
}
.win-headline{
  font-size:clamp(1.35rem,5.2vw,3.85rem);
  font-weight:900;
  line-height:1.12;
  text-align:center;
  letter-spacing:-.02em;
  text-wrap:balance;
  padding:0 8px;
  background:linear-gradient(
    105deg,
    #ff006e 0%,
    #ffbe0b 18%,
    #8338ec 38%,
    #3a86ff 55%,
    #06ffa5 72%,
    #e94560 88%,
    #ff006e 100%
  );
  background-size:280% 100%;
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
  background-clip:text;
  filter:drop-shadow(0 4px 28px rgba(168,85,247,.55)) drop-shadow(0 0 40px rgba(233,69,96,.35));
  animation:winGradient 5s linear infinite,winHeadlineIn .85s cubic-bezier(.34,1.4,.64,1) both;
}
@keyframes winGradient{
  0%{background-position:0% 50%}
  100%{background-position:100% 50%}
}
@keyframes winHeadlineIn{
  from{opacity:0;transform:scale(.88) translateY(24px)}
  to{opacity:1;transform:scale(1) translateY(0)}
}
.win-celebration-btns{
  pointer-events:auto;
  display:flex;
  flex-wrap:wrap;
  gap:12px;
  justify-content:center;
}
.wp-btn{
  min-width:140px;
  padding:12px 20px;border:none;border-radius:12px;
  font-size:.88rem;font-weight:700;cursor:pointer;
  transition:transform .12s,box-shadow .15s;letter-spacing:.02em;
}
.wp-btn:hover{transform:translateY(-2px)}
.wp-btn.p{
  background:linear-gradient(135deg,#e94560,#c0185e);color:#fff;
  box-shadow:0 6px 22px rgba(233,69,96,.5);
}
.wp-btn.p:hover{box-shadow:0 10px 28px rgba(233,69,96,.6)}
.wp-btn.s{background:#0f3460;color:#b0b0d0;border:1px solid rgba(168,85,247,.28)}
#winCelebration.win-effect-minimal #fireworksCanvas{opacity:.35}
#winCelebration.win-effect-off #fireworksCanvas{opacity:1}
.win-headline.plain{
  background:none!important;
  -webkit-text-fill-color:unset!important;
  color:var(--win-text-color,#e8e8f0);
  animation:winHeadlineIn .85s cubic-bezier(.34,1.4,.64,1) both;
}
.win-headline.plain.no-anim{animation:none}

<script>
// ═══════════════════════════════════════════════════════════
//  i18n (FR / EN)
// ═══════════════════════════════════════════════════════════
const I18N_STORAGE_KEY = 'picture2puzzle.lang';
let I18N_LANG = 'fr';
let I18N_DICT = {};

function i18nDeepGet(obj, path) {
  return path.split('.').reduce(function (o, k) {
    return o != null && o[k] !== undefined ? o[k] : undefined;
  }, obj);
}

function t(key, params) {
  var s = i18nDeepGet(I18N_DICT, key);
  if (s == null || typeof s !== 'string') s = key;
  if (params && typeof s === 'string') {
    Object.keys(params).forEach(function (k) {
      s = s.split('{' + k + '}').join(String(params[k]));
    });
  }
  return s;
}

function messageForApiError(status, data) {
  data = data || {};
  var code = data.code;
  if (code) {
    var msg = t('apiErrors.' + code);
    if (msg !== 'apiErrors.' + code) return msg;
  }
  return t('apiErrors.UNKNOWN');
}

function resolveInitialLang() {
  try {
    var u = new URLSearchParams(window.location.search);
    var q = (u.get('lang') || '').toLowerCase();
    if (q === 'fr' || q === 'en') return q;
  } catch (e) {}
  try {
    var ls = localStorage.getItem(I18N_STORAGE_KEY);
    if (ls === 'fr' || ls === 'en') return ls;
  } catch (e2) {}
  var nav = (navigator.language || 'fr').toLowerCase();
  if (nav.indexOf('en') === 0) return 'en';
  return 'fr';
}

async function loadI18nDict(lang) {
  var paths = ['assets/i18n/' + lang + '.json', './assets/i18n/' + lang + '.json'];
  for (var i = 0; i < paths.length; i++) {
    try {
      var r = await fetch(paths[i]);
      if (r.ok) return await r.json();
    } catch (e) {}
  }
  return null;
}

function applyI18nDom() {
  document.documentElement.lang = I18N_LANG === 'en' ? 'en' : 'fr';
  document.title = t('meta.pageTitle');

  document.querySelectorAll('[data-i18n-html]').forEach(function (el) {
    var hk = el.getAttribute('data-i18n-html');
    if (hk) el.innerHTML = t(hk);
  });

  document.querySelectorAll('[data-i18n]').forEach(function (el) {
    var key = el.getAttribute('data-i18n');
    if (!key) return;
    var attr = el.getAttribute('data-i18n-attr');
    var val = t(key);
    var alsoText = el.hasAttribute('data-i18n-also-text');
    if (attr) {
      el.setAttribute(attr, val);
      if (!alsoText) return;
    }
    el.textContent = val;
  });
}

function updateLangSwitchUi() {
  var bf = document.getElementById('btnLangFr');
  var be = document.getElementById('btnLangEn');
  if (bf) bf.setAttribute('aria-pressed', I18N_LANG === 'fr' ? 'true' : 'false');
  if (be) be.setAttribute('aria-pressed', I18N_LANG === 'en' ? 'true' : 'false');
}

function refreshDynamicI18nStrings() {
  setUxWalkStageVisibility(guidedStepIndex);
  setUxWalkDevice(uxWalkDevice);
  updateUxWalkLiveHint(guidedStepIndex);
  updateBuilderPreviews();
  applyShareGateTextsToDom();
  updateToolTitle();
}

async function setAppLang(lang) {
  if (lang !== 'fr' && lang !== 'en') return;
  try {
    localStorage.setItem(I18N_STORAGE_KEY, lang);
  } catch (e) {}
  I18N_LANG = lang;
  var d = await loadI18nDict(lang);
  if (!d) d = await loadI18nDict('fr');
  I18N_DICT = d || {};
  applyI18nDom();
  updateLangSwitchUi();
  refreshDynamicI18nStrings();
}

function guidedFloatTitles() {
  var g = I18N_DICT.guided;
  return (g && g.titles) || [];
}

function guidedStepHintsList() {
  var g = I18N_DICT.guided;
  return (g && g.hints) || [];
}

function getOccasionPresetsMap() {
  var o = I18N_DICT.occasions;
  if (!o) return {};
  var keys = [
    'anniversaire',
    'naissance',
    'mariage',
    'soiree',
    'cadeau',
    'surprise',
    'vacances',
    'saint-valentin'
  ];
  var out = {};
  for (var i = 0; i < keys.length; i++) {
    var k = keys[i];
    if (o[k]) out[k] = o[k];
  }
  return out;
}

// ═══════════════════════════════════════════════════════════
//  SCÉNARIO (formulaire + partage)
// ═══════════════════════════════════════════════════════════
const FONT_MAP = {
  system: { stack: "'Segoe UI',system-ui,sans-serif", google: null },
  bebas: { stack: "'Bebas Neue',sans-serif", google: 'Bebas+Neue' },
  pacifico: { stack: "'Pacifico',cursive", google: 'Pacifico' },
  dancing: { stack: "'Dancing Script',cursive", google: 'Dancing+Script' },
  playfair: { stack: "'Playfair Display',serif", google: 'Playfair+Display' },
  rubik: { stack: "'Rubik',sans-serif", google: 'Rubik:wght@400;700' }
};

const MAX_IMAGE_BYTES = 8 * 1024 * 1024;

function defaultScenario() {
  return {
    toolTitle: '',
    shareGateTitle: '',
    shareGateBody: '',
    winText: t('defaults.winText'),
    winEffect: 'fireworks',
    winEffectEnabled: true,
    winFontKey: 'system',
    winTextColor: '#e8e8f0',
    winTextGradient: true,
    gridCols: 3,
    gridRows: 3
  };
}

let scenario;
let selectedImageFile = null;
let previewObjectUrl = null;
let shareLoadId = null;
let creationMode = 'uxwalk';
let guidedStepIndex = 0;
let uxWalkDevice = 'desktop';
let uxWalkCropHint = '';
let guidedPanelUserPos = null;
let guidedPanelDragging = false;
let guidedPanelDragPtr = null;
const BUILDER_STEP_COUNT = 5;
const OCCASION_FALLBACK = 'cadeau';
let occasionSelection = {
  1: OCCASION_FALLBACK,
  3: OCCASION_FALLBACK,
  4: OCCASION_FALLBACK
};

function normalizeOccasionKey(key) {
  return getOccasionPresetsMap()[key] ? key : OCCASION_FALLBACK;
}

function setOccasionVisual(step, key) {
  const root = document.getElementById('occasionCapsStep' + step);
  if (!root) return;
  const k = normalizeOccasionKey(key);
  root.querySelectorAll('.occasion-chip[data-occasion]').forEach((btn) => {
    const active = btn.getAttribute('data-occasion') === k;
    btn.classList.toggle('is-active', active);
    btn.setAttribute('aria-pressed', active ? 'true' : 'false');
  });
}

function setOccasionSelection(step, key) {
  const k = normalizeOccasionKey(key);
  occasionSelection[step] = k;
  setOccasionVisual(step, k);
}

function applyOccasionTextForStep(step, key) {
  const p = getOccasionPresetsMap()[normalizeOccasionKey(key)];
  if (!p) return;
  if (step === 1) {
    const t1 = document.getElementById('inputShareGateTitle');
    const b1 = document.getElementById('textareaShareGateBody');
    if (t1) t1.value = p.step1Title;
    if (b1) b1.value = p.step1Body;
    return;
  }
  if (step === 3) {
    const t4 = document.getElementById('inputToolTitle');
    if (t4) t4.value = p.step3Title;
    return;
  }
  if (step === 4) {
    const w5 = document.getElementById('textareaWinText');
    if (w5) w5.value = p.step4Win;
  }
}

function applyOccasionPreset(step, key, options) {
  const opts = options || {};
  const k = normalizeOccasionKey(key);
  const syncLinked = !!opts.syncLinkedFromStep1;
  setOccasionSelection(step, k);
  applyOccasionTextForStep(step, k);

  if (step === 1 && syncLinked) {
    setOccasionSelection(3, k);
    setOccasionSelection(4, k);
    applyOccasionTextForStep(3, k);
    applyOccasionTextForStep(4, k);
  }

  if (opts.skipRefresh) return;
  readFormToScenario();
  updateBuilderPreviews();
}

function detectOccasionFromText() {
  const txt = [
    (document.getElementById('inputShareGateTitle') || {}).value || '',
    (document.getElementById('textareaShareGateBody') || {}).value || '',
    (document.getElementById('inputToolTitle') || {}).value || '',
    (document.getElementById('textareaWinText') || {}).value || ''
  ]
    .join(' ')
    .toLowerCase();
  if (!txt.trim()) return '';

  const checks = [
    ['saint-valentin', ['valentin', 'amour', 'love', 'coeur']],
    ['anniversaire', ['anniversaire', 'birthday']],
    ['naissance', ['naissance', 'bebe', 'baby', 'bienvenue']],
    ['mariage', ['mariage', 'marie', 'wedding', 'union']],
    ['soiree', ['soiree', 'soirée', 'party', 'fete', 'fête', 'invitation']],
    ['surprise', ['il y a une surprise pour toi', 'surprise pour toi']],
    ['vacances', ['vacances', 'voyage', 'plage', 'ete', 'souvenir']],
    ['cadeau', ['cadeau', 'surprise', 'present', 'gift']]
  ];
  for (let i = 0; i < checks.length; i++) {
    const key = checks[i][0];
    const words = checks[i][1];
    if (words.some((w) => txt.includes(w))) return key;
  }
  return '';
}

function syncOccasionSelectionsFromCurrentFields() {
  const key = normalizeOccasionKey(detectOccasionFromText() || OCCASION_FALLBACK);
  setOccasionSelection(1, key);
  setOccasionSelection(3, key);
  setOccasionSelection(4, key);
}

function initOccasionCapsules() {
  const steps = [1, 3, 4];
  steps.forEach((step) => {
    const root = document.getElementById('occasionCapsStep' + step);
    if (!root) return;
    root.querySelectorAll('.occasion-chip[data-occasion]').forEach((btn) => {
      btn.addEventListener('click', () => {
        const key = btn.getAttribute('data-occasion') || OCCASION_FALLBACK;
        if (step === 1) {
          applyOccasionPreset(1, key, { syncLinkedFromStep1: true });
        } else {
          applyOccasionPreset(step, key);
        }
      });
    });
  });

  const sid = getQueryScenarioId();
  const w5 = ((document.getElementById('textareaWinText') || {}).value || '').trim();
  const hasCustom =
    !!((document.getElementById('inputShareGateTitle') || {}).value || '').trim() ||
    !!((document.getElementById('textareaShareGateBody') || {}).value || '').trim() ||
    !!((document.getElementById('inputToolTitle') || {}).value || '').trim() ||
    (w5 && w5 !== t('defaults.winText'));

  if (!sid && !hasCustom) {
    applyOccasionPreset(1, OCCASION_FALLBACK, { syncLinkedFromStep1: true, skipRefresh: true });
    readFormToScenario();
    updateBuilderPreviews();
    return;
  }
  syncOccasionSelectionsFromCurrentFields();
}

function clampGridDims(c, r) {
  c = Math.round(Number(c));
  r = Math.round(Number(r));
  if (!Number.isFinite(c) || c < 2) c = 3;
  if (!Number.isFinite(r) || r < 2) r = 3;
  c = Math.min(12, Math.max(2, c));
  r = Math.min(12, Math.max(2, r));
  while (c * r > 64) {
    if (c >= r) c--; else r--;
  }
  return { c, r };
}

function syncGridFromScenario() {
  const { c, r } = clampGridDims(scenario.gridCols, scenario.gridRows);
  scenario.gridCols = c;
  scenario.gridRows = r;
  gridCols = c;
  gridRows = r;
}

function fontStackForScenario() {
  const key = scenario.winFontKey && FONT_MAP[scenario.winFontKey] ? scenario.winFontKey : 'system';
  return FONT_MAP[key].stack;
}

function ensureGoogleFont(key) {
  const k = key && FONT_MAP[key] ? key : 'system';
  const g = FONT_MAP[k].google;
  let link = document.getElementById('googleFontLink');
  if (!g) {
    if (link) link.remove();
    return;
  }
  const href = 'https://fonts.googleapis.com/css2?family=' + g + '&display=swap';
  if (!link) {
    link = document.createElement('link');
    link.id = 'googleFontLink';
    link.rel = 'stylesheet';
    document.head.appendChild(link);
  }
  link.href = href;
}

function setWinHeadlineContent(el, text) {
  if (!el) return;
  el.textContent = '';
  const lines = String(text || '').split('\n');
  lines.forEach((line, i) => {
    if (i) el.appendChild(document.createElement('br'));
    el.appendChild(document.createTextNode(line));
  });
}

function applyShareGateTextsToDom() {
  const gateTitleStr =
    (scenario.shareGateTitle && String(scenario.shareGateTitle).trim()) || t('defaults.shareGateTitle');
  const gateBodyStr =
    (scenario.shareGateBody && String(scenario.shareGateBody).trim()) || t('defaults.shareGateBody');
  const titleEl = document.getElementById('shareGateCardTitle');
  const bodyEl = document.getElementById('shareGateCardBody');
  if (titleEl) titleEl.textContent = gateTitleStr;
  if (bodyEl) setWinHeadlineContent(bodyEl, gateBodyStr);
}

function applyWinHeadlineStyles() {
  const el = document.getElementById('winHeadline');
  if (!el) return;
  ensureGoogleFont(scenario.winFontKey);
  setWinHeadlineContent(el, scenario.winText);
  el.style.fontFamily = fontStackForScenario();
  const color = scenario.winTextColor || '#e8e8f0';
  el.style.setProperty('--win-text-color', color);
  if (scenario.winTextGradient) {
    el.classList.remove('plain');
    el.style.color = '';
  } else {
    el.classList.add('plain');
    el.style.color = color;
  }
}

function readFormToScenario() {
  scenario.shareGateTitle = (document.getElementById('inputShareGateTitle') || {}).value || '';

function getPreviewCropNote(gc, gr, prevEl) {
  const n = gc * gr;
  const targetAR = gc / gr;
  let s = t('previewCrop.intro', { cols: gc, rows: gr, n: n });
  if (!prevEl || prevEl.hidden || !prevEl.getAttribute('src')) {
    return s + t('previewCrop.noImage');
  }
  const iw = prevEl.naturalWidth;
  const ih = prevEl.naturalHeight;
  if (!iw || !ih) {
    return s + t('previewCrop.loadingImage');
  }
  const srcAR = iw / ih;
  if (Math.abs(srcAR - targetAR) < 0.025) {
    return s + t('previewCrop.ratioMatch');
  }
  if (srcAR > targetAR) {
    return s + t('previewCrop.cropSides');
  }
  return s + t('previewCrop.cropTopBottom');
}

function getShowcaseAvoidRect(pad) {
  const p = pad == null ? 10 : pad;
  const col =
    document.querySelector('#setupPreviewsColumn .setup-previews-inner') ||
    document.getElementById('setupPreviewsColumn');
  if (!col) return { left: 0, top: 0, right: 0, bottom: 0 };
  const r = col.getBoundingClientRect();

    left: r.left - p,
    top: r.top - p,
    right: r.right + p,
    bottom: r.bottom + p
  };
}

function getGuidedPanelAvoidRect(pad) {
  const p = pad == null ? 10 : pad;
  if (creationMode === 'uxwalk') {
    const pkg = document.getElementById('uxWalkViewportPackage');
    const bezel = document.getElementById('uxWalkViewportBezel');
    const shell = document.getElementById('uxWalkShell');
    if (
      pkg &&
      bezel &&
      shell &&
      !shell.hidden &&
      getComputedStyle(shell).display !== 'none' &&
      !pkg.hidden &&
      getComputedStyle(pkg).display !== 'none'
    ) {
      const r = bezel.getBoundingClientRect();
      if (r.width > 12 && r.height > 12) {
        return {
          left: r.left - p,
          top: r.top - p,
          right: r.right + p,
          bottom: r.bottom + p
        };
      }
    }
  }
  return getShowcaseAvoidRect(pad);
}

function rectsIntersect(a, b) {
  return !(a.right <= b.left || a.left >= b.right || a.bottom <= b.top || a.top >= b.bottom);
}

function panelRectAt(left, top, w, h) {
  return { left, top, right: left + w, bottom: top + h };
}

function snapGuidedPanelToFreeSpace(desiredLeft, desiredTop, w, h) {
  const m = 12;
  const vw = window.innerWidth;
  const vh = window.innerHeight;
  const avoid = getGuidedPanelAvoidRect(m);

  function clampV(l, t) {
    return {
      left: Math.max(m, Math.min(l, vw - w - m)),
      top: Math.max(m, Math.min(t, vh - h - m))
    };
  }

  function clearAt(l, t) {
    const c = clampV(l, t);
    return rectsIntersect(panelRectAt(c.left, c.top, w, h), avoid) ? null : c;
  }

  const direct = clearAt(desiredLeft, desiredTop);
  if (direct) return direct;

  // If the desired position overlaps the showcase, prefer moving to one side
  // (same Y when possible) so drag-and-drop feels natural.
  const avoidCenterX = (avoid.left + avoid.right) / 2;
  const desiredCenterX = desiredLeft + w / 2;
  const preferRight = desiredCenterX >= avoidCenterX;
  const sidePrimary = preferRight ? avoid.right + m : avoid.left - m - w;
  const sideSecondary = preferRight ? avoid.left - m - w : avoid.right + m;
  const sideYs = [desiredTop, (vh - h) / 2, m, vh - h - m];

  for (let i = 0; i < sideYs.length; i++) {
    const c = clearAt(sidePrimary, sideYs[i]);
    if (c) return c;
  }
  for (let i = 0; i < sideYs.length; i++) {
    const c = clearAt(sideSecondary, sideYs[i]);
    if (c) return c;
  }

  const fallback = [];
  const add = (l0, t0) => {
    const c = clearAt(l0, t0);
    if (c) fallback.push(c);
  };

  add(desiredLeft, avoid.bottom + m);
  add(desiredLeft, avoid.top - m - h);
  add((vw - w) / 2, avoid.bottom + m);
  add(m, avoid.bottom + m);
  add(vw - w - m, avoid.bottom + m);
  add((vw - w) / 2, avoid.top - m - h);

  add(m, m);
  add(vw - w - m, m);
  add(m, vh - h - m);
  add(vw - w - m, vh - h - m);

  if (!fallback.length) {
    const t = Math.min(Math.max(m, avoid.bottom + m), vh - h - m);
    return { left: Math.max(m, Math.min((vw - w) / 2, vw - w - m)), top: t };
  }

  let best = fallback[0];
  let bestD = Infinity;
  for (const c of fallback) {
    const dx = c.left - desiredLeft;
    const dy = c.top - desiredTop;
    const d = dx * dx + dy * dy;
    if (d < bestD) {
      bestD = d;
      best = c;
    }
  }
  return best;
}

function clampGuidedPanelPosition(left, top, w, h) {
  return snapGuidedPanelToFreeSpace(left, top, w, h);
}

function computeAutoGuidedPanelPosition(panel) {
  const w = panel.offsetWidth || 380;
  const h = panel.offsetHeight || 300;
  const m = 12;
  const vw = window.innerWidth;
  const vh = window.innerHeight;
  const avoid = getGuidedPanelAvoidRect(m);
  if (creationMode === 'uxwalk' && avoid.right > avoid.left + 20) {
    const rightOf = snapGuidedPanelToFreeSpace(avoid.right + m, Math.max(m, (vh - h) / 2), w, h);
    if (rightOf && !rectsIntersect(panelRectAt(rightOf.left, rightOf.top, w, h), avoid)) return rightOf;
    const leftOf = snapGuidedPanelToFreeSpace(avoid.left - m - w, Math.max(m, (vh - h) / 2), w, h);
    if (leftOf && !rectsIntersect(panelRectAt(leftOf.left, leftOf.top, w, h), avoid)) return leftOf;
  }
  return snapGuidedPanelToFreeSpace((vw - w) / 2, avoid.bottom + m, w, h);
}

function applyGuidedPanelPixelPos(panel, pos) {
  panel.style.left = pos.left + 'px';
  panel.style.top = pos.top + 'px';
  panel.style.right = 'auto';
  panel.style.bottom = 'auto';
  panel.style.transform = '';
}

      ? 'gate'
      : guidedStepIndex <= 2
        ? 'game'
        : 'win';
  document.querySelectorAll('.preview-block[data-preview-stage]').forEach((b) => {

function positionGuidedFloatingPanel() {
  const panel = document.getElementById('guidedFloatingPanel');
  const setup = document.getElementById('setup');
  if (!panel || !setup) return;
  if (getComputedStyle(setup).display === 'none') return;

  if (creationMode !== 'guided') return;
  if (guidedPanelDragging) return;

  const w = panel.offsetWidth || 360;
  const h = panel.offsetHeight || 320;
  let pos;
  if (guidedPanelUserPos) {
    pos = clampGuidedPanelPosition(guidedPanelUserPos.left, guidedPanelUserPos.top, w, h);
    guidedPanelUserPos = pos;
  } else {
    pos = computeAutoGuidedPanelPosition(panel);
  }
  applyGuidedPanelPixelPos(panel, pos);
}

function getGuidedStepForField(focusId) {
  if (focusId === 'inputShareGateTitle' || focusId === 'textareaShareGateBody') return 0;
  if (focusId === 'dropZone' || focusId === 'inputGridCols' || focusId === 'inputGridRows') return 1;
  if (focusId === 'inputToolTitle') return 2;
  if (
    focusId === 'textareaWinText' ||
    focusId === 'selectWinEffect' ||
    focusId === 'checkWinEffectEnabled' ||
    focusId === 'selectWinFont' ||
    focusId === 'inputWinColor' ||
    focusId === 'checkWinGradient'
  )
    return 3;
  return null;
}

function focusBuilderField(focusId) {
  const el = document.getElementById(focusId);
  if (!el) return;
  try {
    el.focus({ preventScroll: true });
  } catch (e) {
    el.focus();
  }
  if (el.tagName === 'INPUT') {
    const t = el.type;
    if (t === 'text' || t === 'number' || t === 'search' || t === 'url') el.select();
  }
  if (el.tagName === 'TEXTAREA') el.select();
  el.classList.remove('field-flash');
  void el.offsetWidth;
  el.classList.add('field-flash');
  window.setTimeout(() => el.classList.remove('field-flash'), 1100);
}

function openFieldFromPreview(focusId) {
  if (!focusId) return;
  const setup = document.getElementById('setup');
  if (!setup || getComputedStyle(setup).display === 'none') return;

  const step = getGuidedStepForField(focusId);
  const runFocus = () => {
    focusBuilderField(focusId);
    const el = document.getElementById(focusId);
    if (el) {
      try {
        el.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
      } catch (e) {
        el.scrollIntoView();
      }
    }
  };

  if ((creationMode === 'guided' || creationMode === 'uxwalk') && step != null) {
    setGuidedStep(step, runFocus);
  } else {
    runFocus();
  }
}

function bindPreviewClickToEdit(container) {
  if (!container) return;

  container.addEventListener('click', (e) => {
    if (e.target.closest('.guided-nav-btn') || e.target.closest('.ux-walk-side-nav')) return;
    const host = e.target.closest('[data-edit-target]');
    if (!host || !container.contains(host)) return;
    const id = host.getAttribute('data-edit-target');
    if (!id) return;
    e.preventDefault();
    openFieldFromPreview(id);
  });

  container.addEventListener('keydown', (e) => {
    if (e.key !== 'Enter' && e.key !== ' ') return;
    if (e.target.closest('.guided-nav-btn') || e.target.closest('.ux-walk-side-nav')) return;
    const host = e.target.closest('[data-edit-target]');
    if (!host || !container.contains(host)) return;
    if (document.activeElement !== host) return;
    const id = host.getAttribute('data-edit-target');
    if (!id) return;
    e.preventDefault();
    openFieldFromPreview(id);
  });
}

function initGuidedPanelDrag() {
  const panel = document.getElementById('guidedFloatingPanel');
  const bar = document.getElementById('guidedFloatDragBar');
  if (!panel) return;

  function guidedDragTargetOk(target) {
    if (!target || !target.closest) return false;
    if (target.closest('input, textarea, select, button, option, label, a')) return false;
    return true;
  }

  function resetGuidedPanelPlacement(e) {
    if (creationMode !== 'guided') return;
    e.preventDefault();
    e.stopPropagation();
    guidedPanelUserPos = null;
    positionGuidedFloatingPanel();
  }

  if (bar) bar.addEventListener('dblclick', resetGuidedPanelPlacement);

  panel.addEventListener('pointerdown', (e) => {
    if (creationMode !== 'guided') return;
    if (e.button !== 0) return;
    if (!guidedDragTargetOk(e.target)) return;
    e.preventDefault();
    const r = panel.getBoundingClientRect();
    guidedPanelDragPtr = {
      id: e.pointerId,
      ox: e.clientX - r.left,
      oy: e.clientY - r.top
    };
    guidedPanelDragging = true;
    panel.classList.add('guided-floating-panel--dragging');
    try {
      panel.setPointerCapture(e.pointerId);
    } catch (err) {}

    const move = (ev) => {
      if (!guidedPanelDragPtr || ev.pointerId !== guidedPanelDragPtr.id) return;
      const left = ev.clientX - guidedPanelDragPtr.ox;
      const top = ev.clientY - guidedPanelDragPtr.oy;
      const pos = snapGuidedPanelToFreeSpace(left, top, panel.offsetWidth, panel.offsetHeight);
      applyGuidedPanelPixelPos(panel, pos);
      guidedPanelUserPos = pos;
    };

    const end = (ev) => {
      if (!guidedPanelDragPtr || ev.pointerId !== guidedPanelDragPtr.id) return;
      try {
        panel.releasePointerCapture(ev.pointerId);
      } catch (err2) {}
      guidedPanelDragPtr = null;
      guidedPanelDragging = false;
      panel.classList.remove('guided-floating-panel--dragging');
      window.removeEventListener('pointermove', move);
      window.removeEventListener('pointerup', end);
      window.removeEventListener('pointercancel', end);
    };

    window.addEventListener('pointermove', move);
    window.addEventListener('pointerup', end);
    window.addEventListener('pointercancel', end);
  });
}

function updateUxWalkStageCentering() {
  const viewport = document.getElementById('uxWalkViewportScreen');
  if (!viewport) return;
  viewport.querySelectorAll('.ux-walk-stage').forEach((stage) => {
    if (stage.hidden) {
      stage.classList.remove('is-centered');
      return;
    }
    let contentH = 0;
    Array.from(stage.children).forEach((child) => {
      const cs = getComputedStyle(child);
      if (child.hidden || cs.display === 'none') return;
      const mt = parseFloat(cs.marginTop) || 0;
      const mb = parseFloat(cs.marginBottom) || 0;
      contentH += child.getBoundingClientRect().height + mt + mb;
    });
    const available = Math.max(0, stage.clientHeight - 24);
    stage.classList.toggle('is-centered', contentH > 0 && contentH <= available);
  });
}

function updateUxWalkLiveHint(i) {
  const el = document.getElementById('uxWalkOutsideHint');
  if (!el) return;
  if (i === 0) {
    el.textContent = t('uxWalk.outsideHint0');
    return;
  }
  if (i === 1) {
    el.textContent = uxWalkCropHint || guidedStepHintsList()[1] || '';
    return;

/** Taille d’une cellule (px) — recalculée selon la fenêtre (grand écran / projecteur). */
let PS = 100;
let JIG_PAD = 36;
const SNAP_ANG   = Math.PI / 7;      // ~25.7° angle tolerance
const ROT_STEP   = Math.PI / 4;      // 45° (1/8 tour) per wheel notch
const TOUCH_DOUBLE_TAP_MS = 320;
const TOUCH_DOUBLE_TAP_DIST = 34;
/** Part de min(W,H) pour le côté du puzzle résolu ; un peu plus sur très grand écran (projecteur). */
const PUZZLE_SCREEN_FRACTION = 0.5;
const PS_MIN = 36;
/** Profondeur relative des languettes (fraction du côté). */
const TAB_DEPTH  = 0.2;
const TAB_HALF_W = 0.24;

let tabR = []; // tabR[r][c] = ±1 entre (r,c) et (r,c+1), c ∈ [0, N-2]
let tabD = []; // tabD[r][c] = ±1 entre (r,c) et (r+1,c], r ∈ [0, N-2]

// ═══════════════════════════════════════════════════════════
//  STATE  (grille colonnes × lignes, alignée sur scenario)
// ═══════════════════════════════════════════════════════════
let gridCols = 3;
let gridRows = 3;
let srcImg = null;
let tiles  = [];    // tiles[row][col] → <canvas> pièce puzzle découpée + hitPath

let pieces = [];    // [{id, row, col, groupId}]
let groups = {};    // {gid → {id, x, y, angle, members:[{pid,lx,ly}]}}
let gidSeq = 0;

let selId  = null;  // id of currently selected piece
let drag   = null;  // {gid, sx, sy, ox, oy, moved}
let winState = false; // true once puzzle is solved
let activePointerId = null;
let lastTouchTap = null;

// snap flash: [{cx,cy,t}] short-lived visual feedback
let flashes = [];

let canvas, ctx, W, H;
let rafId = null;
let canvasListenersBound = false;
let imageReady = false;
let windowResizeBound = false;

// ═══════════════════════════════════════════════════════════
//  FEUX D’ARTIFICE (canvas plein écran, victoire)
// ═══════════════════════════════════════════════════════════
let fwCanvas, fwCtx, fwParticles = [], fwRunning = false, fwRaf = null, fwLastSpawn = 0;
const FW_COLORS = ['#e94560','#ff006e','#ffbe0b','#8338ec','#3a86ff','#06ffa5','#ffffff','#a855f7','#fb923c','#22d3ee'];

function resizeFireworksCanvas() {
  if (!fwCanvas) return;
  fwCanvas.width = window.innerWidth;
  fwCanvas.height = window.innerHeight;
}

function spawnBurst(x, y) {
  if (!fwCtx) return;
  const n = 52 + (Math.random() * 48 | 0);
  for (let i = 0; i < n; i++) {
    const ang = Math.random() * Math.PI * 2;
    const spd = 2 + Math.random() * 6;
    fwParticles.push({
      x, y,
      vx: Math.cos(ang) * spd,
      vy: Math.sin(ang) * spd,
      life: 1,
      decay: 0.009 + Math.random() * 0.014,
      color: FW_COLORS[(Math.random() * FW_COLORS.length) | 0],
      size: 1.6 + Math.random() * 3.2
    });
  }
}

function tickFireworks(ts) {
  if (!fwRunning || !fwCtx) return;
  if (ts - fwLastSpawn > 400 + Math.random() * 500) {
    fwLastSpawn = ts;
    const w = fwCanvas.width, h = fwCanvas.height;
    spawnBurst(w * (0.08 + Math.random() * 0.84), h * (0.08 + Math.random() * 0.42));
  }
  fwCtx.fillStyle = 'rgba(11,11,23,0.2)';
  fwCtx.fillRect(0, 0, fwCanvas.width, fwCanvas.height);
  const keep = [];
  for (const p of fwParticles) {
    p.x += p.vx;
    p.y += p.vy;
    p.vy += 0.11;
    p.life -= p.decay;
    if (p.life <= 0) continue;
    keep.push(p);
    fwCtx.beginPath();
    fwCtx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
    fwCtx.fillStyle = p.color;
    fwCtx.globalAlpha = Math.min(1, p.life);
    fwCtx.fill();
  }
  fwCtx.globalAlpha = 1;
  fwParticles = keep;
  fwRaf = requestAnimationFrame(tickFireworks);
}

function startFireworks() {
  fwCanvas = document.getElementById('fireworksCanvas');
  if (!fwCanvas) return;
  fwCtx = fwCanvas.getContext('2d');
  resizeFireworksCanvas();
  fwParticles = [];
  fwRunning = true;
  fwLastSpawn = performance.now();
  const w = fwCanvas.width, h = fwCanvas.height;
  for (let i = 0; i < 7; i++) {
    const delay = i * (70 + (Math.random() * 90 | 0));
    setTimeout(() => {
      if (!fwRunning) return;
      spawnBurst(w * (0.12 + Math.random() * 0.76), h * (0.08 + Math.random() * 0.36));
    }, delay);
  }
  cancelAnimationFrame(fwRaf);
  fwRaf = requestAnimationFrame(tickFireworks);
}

function stopFireworks() {
  fwRunning = false;
  cancelAnimationFrame(fwRaf);
  fwRaf = null;
  fwParticles = [];
  if (fwCtx && fwCanvas)
    fwCtx.clearRect(0, 0, fwCanvas.width, fwCanvas.height);
}

// ═══════════════════════════════════════════════════════════
//  CONFETTIS (canvas victoire)
// ═══════════════════════════════════════════════════════════
let cfParticles = [], cfRunning = false, cfRaf = null, cfLast = 0;

function tickConfetti(ts) {
  if (!cfRunning || !fwCtx) return;
  if (ts - cfLast > 55) {
    cfLast = ts;
    const w = fwCanvas.width, h = fwCanvas.height;
    for (let i = 0; i < 14; i++) {
      cfParticles.push({
        x: Math.random() * w,
        y: -8 - Math.random() * 40,
        vx: (Math.random() - 0.5) * 3,
        vy: 2 + Math.random() * 5,
        rot: Math.random() * Math.PI * 2,
        vr: (Math.random() - 0.5) * 0.2,
        w: 6 + Math.random() * 8,
        h: 4 + Math.random() * 6,
        color: FW_COLORS[(Math.random() * FW_COLORS.length) | 0],
        life: 1
      });
    }
  }
  fwCtx.fillStyle = 'rgba(11,11,23,0.18)';
  fwCtx.fillRect(0, 0, fwCanvas.width, fwCanvas.height);
  const keep = [];
  for (const p of cfParticles) {
    p.x += p.vx;
    p.y += p.vy;
    p.vy += 0.04;
    p.rot += p.vr;
    p.life -= 0.004;
    if (p.life <= 0 || p.y > fwCanvas.height + 20) continue;
    keep.push(p);
    fwCtx.save();
    fwCtx.translate(p.x, p.y);
    fwCtx.rotate(p.rot);
    fwCtx.fillStyle = p.color;
    fwCtx.globalAlpha = Math.min(1, p.life);
    fwCtx.fillRect(-p.w / 2, -p.h / 2, p.w, p.h);
    fwCtx.restore();
  }
  fwCtx.globalAlpha = 1;
  cfParticles = keep;
  cfRaf = requestAnimationFrame(tickConfetti);
}

function startConfetti() {
  fwCanvas = document.getElementById('fireworksCanvas');
  if (!fwCanvas) return;

  cfLast = performance.now();

}

function stopConfetti() {
