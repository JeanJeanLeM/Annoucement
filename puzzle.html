// ═══════════════════════════════════════════════════════════
//  MATH
// ═══════════════════════════════════════════════════════════
function toWorld(g, lx, ly) {
  const c = Math.cos(g.angle), s = Math.sin(g.angle);
  return { x: g.x + lx*c - ly*s, y: g.y + lx*s + ly*c };
}
function toLocal(g, wx, wy) {
  const dx = wx - g.x, dy = wy - g.y;
  const c = Math.cos(g.angle), s = Math.sin(g.angle);
  return { x: dx*c + dy*s, y: -dx*s + dy*c };
}
function angDiff(a, b) {
  let d = ((a - b) % (2*Math.PI) + 3*Math.PI) % (2*Math.PI) - Math.PI;
  return Math.abs(d);
}

/** Recadrage « cover » : ratio cible = cols/rows (largeur/hauteur), centré. */
function getCoverCropRect(iw, ih, cols, rows) {
  const targetAR = cols / rows;
  const srcAR = iw / ih;
  if (srcAR > targetAR) {
    const sh = ih;
    const sw = ih * targetAR;
    return { sx: (iw - sw) / 2, sy: 0, sw, sh };
  }
  const sw = iw;
  const sh = iw / targetAR;
  return { sx: 0, sy: (ih - sh) / 2, sw, sh };
}

/** Plafond taille d’une pièce (px) : monte sur grand écran / projecteur. */
function pieceSizeCap(avail) {
  if (avail >= 1600) return 440;
  if (avail >= 1200) return 380;
  if (avail >= 800) return 300;
  return 260;
}

/** Côté d’une cellule : fraction de l’écran + plafond selon la taille du viewport. */
function computePieceSize() {
  const gMax = Math.max(gridCols, gridRows);
  const capFallback = pieceSizeCap(520);
  if (!W || !H) return Math.max(PS_MIN, Math.min(capFallback, Math.floor(520 / gMax)));
  const avail = Math.min(W, H);
  const cap = pieceSizeCap(avail);
  const frac = avail >= 1300 ? 0.56 : PUZZLE_SCREEN_FRACTION;
  const targetSide = avail * frac;
  return Math.max(PS_MIN, Math.min(cap, Math.floor(targetSide / gMax)));
}

/**
 * Met à jour PS / JIG_PAD. Si rescaleExisting et qu’une partie est en cours,
 * met à l’échelle positions des groupes pour garder la géométrie après resize.
 */
function applyPieceSizeFromViewport(rescaleExisting) {
  const newPS = computePieceSize();
  if (rescaleExisting && pieces.length > 0) {
    const oldPS = PS;
    if (oldPS > 0 && Math.abs(newPS - oldPS) > 0.01) {
      const r = newPS / oldPS;
      for (const gid of Object.keys(groups)) {
        const g = groups[gid];
        g.x *= r;
        g.y *= r;
        for (const m of g.members) {
          m.lx *= r;
          m.ly *= r;
        }
      }
      for (const f of flashes) {
        f.x *= r;
        f.y *= r;
      }
    }
  }
  PS = newPS;
  JIG_PAD = Math.ceil(PS * 0.36);
}

// ═══════════════════════════════════════════════════════════
//  PIECE HELPERS
// ═══════════════════════════════════════════════════════════
function getMember(g, pid) { return g.members.find(m => m.pid === pid); }

function pieceCenter(p) {
  const g = groups[p.groupId];
  const m = getMember(g, p.id);
  return toWorld(g, m.lx, m.ly);
}

function pieceHit(p, wx, wy) {
  const c = pieceCenter(p);
  const a = groups[p.groupId].angle;
  const dx = wx - c.x, dy = wy - c.y;
  const ca = Math.cos(-a), sa = Math.sin(-a);
  const lx = dx*ca - dy*sa, ly = dx*sa + dy*ca;
  const path = tiles[p.row] && tiles[p.row][p.col] && tiles[p.row][p.col]._hitPath;
  if (path && ctx && typeof ctx.isPointInPath === 'function')
    return ctx.isPointInPath(path, lx, ly);
  const h = PS / 2;
  return Math.abs(lx) <= h && Math.abs(ly) <= h;
}

function pieceAt(wx, wy) {
  for (let i = pieces.length - 1; i >= 0; i--)
    if (pieceHit(pieces[i], wx, wy)) return pieces[i];
  return null;
}

function bringToTop(gid) {
  const mine = pieces.filter(p => p.groupId === gid);
  const rest = pieces.filter(p => p.groupId !== gid);
  pieces = [...rest, ...mine];
}

// ═══════════════════════════════════════════════════════════
//  SNAP & MERGE
// ═══════════════════════════════════════════════════════════

// Merge group B into group A, snapping so that pieceBId
// sits at the correct neighbor position of pieceAId.
// dc/dr: direction from A to B in grid space.
function mergeInto(aGid, aPid, bGid, bPid, dc, dr) {
  const gA = groups[aGid], gB = groups[bGid];
  if (!gA || !gB) return;

  const mA = getMember(gA, aPid);
  const pw = toWorld(gA, mA.lx, mA.ly);
  const cA = Math.cos(gA.angle), sA = Math.sin(gA.angle);

  // Target world position where pBid center should land
  const tx = pw.x + dc*PS*cA - dr*PS*sA;
  const ty = pw.y + dc*PS*sA + dr*PS*cA;

  // New gB origin so that pBid maps to (tx,ty) at angle gA.angle
  const mB = getMember(gB, bPid);
  const nx = tx - (mB.lx*cA - mB.ly*sA);
  const ny = ty - (mB.lx*sA + mB.ly*cA);

  // Reproject all gB members into gA local space
  for (const {pid, lx, ly} of gB.members) {
    const wx = nx + lx*cA - ly*sA;
    const wy = ny + lx*sA + ly*cA;
    const loc = toLocal(gA, wx, wy);
    gA.members.push({ pid, lx: loc.x, ly: loc.y });
    const pc = pieces.find(p => p.id === pid);
    if (pc) pc.groupId = aGid;
  }
  delete groups[bGid];

  // Snap flash at merge point
  flashes.push({ x: tx, y: ty, t: 1.0 });

  updateHUD();
  checkWin();
}

// Try one snap for a group; return true if something snapped.
function trySingleSnap(gid) {
  const g = groups[gid];
  if (!g) return false;
  for (const { pid } of [...g.members]) {
    const p = pieces.find(pc => pc.id === pid);
    if (!p) continue;
    for (const [dr, dc] of [[0,1],[0,-1],[1,0],[-1,0]]) {
      const nb = pieces.find(pc => pc.row === p.row+dr && pc.col === p.col+dc);
      if (!nb || nb.groupId === gid) continue;
      const ng = groups[nb.groupId];
      if (!ng) continue;
      if (angDiff(g.angle, ng.angle) > SNAP_ANG) continue;
      const pc = pieceCenter(p);
      const cg = Math.cos(g.angle), sg = Math.sin(g.angle);
      const ex = pc.x + dc*PS*cg - dr*PS*sg;
      const ey = pc.y + dc*PS*sg + dr*PS*cg;
      const nc = pieceCenter(nb);
      if (Math.hypot(nc.x - ex, nc.y - ey) < PS * 0.42) {
        mergeInto(gid, p.id, nb.groupId, nb.id, dc, dr);
        return true;
      }
    }
  }
  return false;
}

// Chain snaps until no more are found.
function snapAll(gid) {
  while (groups[gid] && trySingleSnap(gid)) {}
}

// ═══════════════════════════════════════════════════════════
//  HUD & WIN
// ═══════════════════════════════════════════════════════════
function updateHUD() {
  const n = Object.keys(groups).length;
  const t = gridCols * gridRows;
  const conn = t - n;
  document.getElementById('piece-count').textContent = `${conn} / ${t-1}`;
  document.getElementById('progress').style.width =
    (t <= 1 ? 100 : conn / (t - 1) * 100) + '%';
}

function checkWin() {
  if (Object.keys(groups).length === 1) {
    setTimeout(showWin, 420);
  }
}

function showWin() {
  winState = true;
  selId = null; drag = null;
  centerPuzzle();
  applyWinHeadlineStyles();
  const cel = document.getElementById('winCelebration');
  cel.classList.add('on');
  cel.setAttribute('aria-hidden', 'false');
  startWinEffect(scenario.winEffectEnabled === false ? 'off' : (scenario.winEffect || 'fireworks'));
}

// Animate the assembled group smoothly to the canvas center.
function centerPuzzle() {
  const gid = Object.keys(groups)[0];
  const g   = groups[gid];
  const p00 = pieces.find(p => p.row === 0 && p.col === 0);
  if (!p00) return;
  const m00 = getMember(g, p00.id);

  // Center of the full image in local space
  const localCx = m00.lx + (gridCols / 2 - 0.5) * PS;
  const localCy = m00.ly + (gridRows / 2 - 0.5) * PS;

  // Current world position of that point
  const wc = toWorld(g, localCx, localCy);

  // Target: move group origin so the image center lands on canvas center
  const tx = g.x + (W / 2 - wc.x);
  const ty = g.y + (H / 2 - wc.y);
  animateGroupTo(g, tx, ty);
}

function animateGroupTo(g, tx, ty) {
  const sx = g.x, sy = g.y;
  let f = 0;
  const total = 48;
  function step() {
    f++;
    const t  = f / total;
    const ease = 1 - Math.pow(1 - t, 3); // cubic ease-out
    g.x = sx + (tx - sx) * ease;
    g.y = sy + (ty - sy) * ease;
    if (f < total) requestAnimationFrame(step);
  }
  requestAnimationFrame(step);
}

// Draw the completed puzzle as a single seamless image (no tile borders).
function drawFullImage() {
  const gid = Object.keys(groups)[0];
  const g   = groups[gid];
  const p00 = pieces.find(p => p.row === 0 && p.col === 0);
  if (!p00) return;
  const m00 = getMember(g, p00.id);

  const tlx = m00.lx - PS / 2;   // top-left of image in group local space
  const tly = m00.ly - PS / 2;
  const pw  = gridCols * PS;
  const ph  = gridRows * PS;

  const iw = srcImg.naturalWidth, ih = srcImg.naturalHeight;
  const crop = getCoverCropRect(iw, ih, gridCols, gridRows);

  ctx.save();
  ctx.translate(g.x, g.y);
  ctx.rotate(g.angle);

  // Gentle glow
  ctx.shadowColor  = 'rgba(168,85,247,.45)';
  ctx.shadowBlur   = 40;

  ctx.drawImage(srcImg, crop.sx, crop.sy, crop.sw, crop.sh, tlx, tly, pw, ph);

  ctx.shadowColor = 'transparent'; ctx.shadowBlur = 0;

  // Thin elegant border
  ctx.strokeStyle = 'rgba(168,85,247,.5)';
  ctx.lineWidth   = 2.5;
  ctx.strokeRect(tlx, tly, pw, ph);

  ctx.restore();
}

// ═══════════════════════════════════════════════════════════
//  RENDER
// ═══════════════════════════════════════════════════════════
function render() {
  ctx.clearRect(0, 0, W, H);

  // Draw snap flashes
  const now = performance.now();
  flashes = flashes.filter(f => f.t > 0);
  for (const f of flashes) {
    const r = (1 - f.t) * PS * 1.5;
    ctx.beginPath();
    ctx.arc(f.x, f.y, r, 0, Math.PI*2);
    ctx.strokeStyle = `rgba(168,85,247,${f.t * 0.8})`;
    ctx.lineWidth = 2;
    ctx.stroke();
    f.t -= 0.04;
  }

  for (const p of pieces) drawPiece(p);

  // Once solved: draw the seamless full image on top
  if (winState) drawFullImage();
}

function drawPiece(p) {
  const g   = groups[p.groupId];
  if (!g) return;
  const m   = getMember(g, p.id);
  const ctr = toWorld(g, m.lx, m.ly);
  const ang = g.angle;
  const sel     = selId === p.id;
  const dragged = drag && drag.gid === p.groupId;
  const h = PS / 2;
  const pad = JIG_PAD;
  const tc = tiles[p.row][p.col];

  ctx.save();
  ctx.translate(ctr.x, ctr.y);
  ctx.rotate(ang);

  ctx.shadowColor = dragged ? 'rgba(233,69,96,.6)'
                  : sel     ? 'rgba(168,85,247,.55)'
                  :           'rgba(0,0,0,.55)';
  ctx.shadowBlur     = dragged ? 30 : sel ? 24 : 10;
  ctx.shadowOffsetX  = dragged ? 0  : 3;
  ctx.shadowOffsetY  = dragged ? 0  : 3;

  ctx.drawImage(tc, -(pad + h), -(pad + h));

  ctx.shadowColor = 'transparent';
  ctx.shadowBlur = ctx.shadowOffsetX = ctx.shadowOffsetY = 0;

  const path = tc._hitPath;
  if (path) {
    ctx.strokeStyle = sel     ? 'rgba(168,85,247,.85)'
                    : dragged ? 'rgba(233,69,96,.95)'
                    :           'rgba(255,255,255,.28)';
    ctx.lineWidth   = sel ? 2.8 : dragged ? 2.2 : 1.2;
    ctx.stroke(path);
    if (sel) {
      ctx.strokeStyle = 'rgba(168,85,247,.35)';
      ctx.lineWidth = 6;
      ctx.stroke(path);
    }
  }

  ctx.restore();
}

function loop() { render(); rafId = requestAnimationFrame(loop); }

// ═══════════════════════════════════════════════════════════
//  POINTER EVENTS
// ═══════════════════════════════════════════════════════════
function cp(e) {
  const r = canvas.getBoundingClientRect();
  return { x: e.clientX - r.left, y: e.clientY - r.top };
}

function onDown(e) {
  if (winState) return;
  const pos = cp(e);
  const p = pieceAt(pos.x, pos.y);
  if (!p) {
    selId = null;
    if ((e.pointerType || 'mouse') === 'touch') lastTouchTap = null;
    return;
  }
  bringToTop(p.groupId);
  const g = groups[p.groupId];
  drag = {
    gid: p.groupId,
    sx: pos.x,
    sy: pos.y,
    ox: g.x,
    oy: g.y,
    moved: false,
    pointerType: e.pointerType || 'mouse'
  };
  if (drag.pointerType === 'mouse') canvas.style.cursor = 'grabbing';
}

function onMove(e) {
  const pos = cp(e);
  const pointerType = (drag && drag.pointerType) || e.pointerType || 'mouse';
  if (!drag) {
    if (pointerType === 'mouse')
      canvas.style.cursor = pieceAt(pos.x, pos.y) ? 'grab' : 'default';
    return;
  }
  const dx = pos.x - drag.sx, dy = pos.y - drag.sy;
  if (!drag.moved && (Math.abs(dx) > 3 || Math.abs(dy) > 3)) {
    drag.moved = true;
    selId = null;
    if (pointerType === 'touch') lastTouchTap = null;
  }
  if (drag.moved && groups[drag.gid]) {
    groups[drag.gid].x = drag.ox + dx;
    groups[drag.gid].y = drag.oy + dy;
  }
}

function onUp(e) {
  if (!drag) return;
  const pointerType = drag.pointerType || e.pointerType || 'mouse';
  if (!drag.moved) {
    const pos = cp(e);
    const p = pieceAt(pos.x, pos.y);
    if (p) {
      if (pointerType === 'touch') {
        const now = performance.now();
        const prev = lastTouchTap;
        const isDoubleTap = !!prev
          && prev.gid === p.groupId
          && now - prev.ts <= TOUCH_DOUBLE_TAP_MS
          && Math.hypot(pos.x - prev.x, pos.y - prev.y) <= TOUCH_DOUBLE_TAP_DIST;
        if (isDoubleTap) {
          const g = groups[p.groupId];
          if (g) {
            bringToTop(p.groupId);
            g.angle += ROT_STEP;
            selId = null;
            snapAll(p.groupId);
          }
          lastTouchTap = null;
        } else {
          handleClick(p);
          lastTouchTap = { ts: now, gid: p.groupId, x: pos.x, y: pos.y };
        }
      } else {
        handleClick(p);
      }
    }
  } else {
    if (pointerType === 'touch') lastTouchTap = null;
    snapAll(drag.gid);
  }
  drag = null;
  activePointerId = null;
  if (pointerType === 'mouse') canvas.style.cursor = 'default';
  if (pointerType !== 'mouse') e.preventDefault();
}

function onPointerDown(e) {
  if (winState) return;
  if (e.pointerType === 'mouse' && e.button !== 0) return;
  if (activePointerId !== null && activePointerId !== e.pointerId) return;
  onDown(e);
  if (!drag) return;
  activePointerId = e.pointerId;
  if (canvas.setPointerCapture) {
    try { canvas.setPointerCapture(e.pointerId); } catch (err) {}
  }
  if ((e.pointerType || 'mouse') !== 'mouse') e.preventDefault();
}

function onPointerMove(e) {
  const pointerType = e.pointerType || 'mouse';
  if (activePointerId !== null && e.pointerId !== activePointerId) return;
  if (activePointerId === null && pointerType !== 'mouse') return;
  onMove(e);
  if (pointerType !== 'mouse' && drag) e.preventDefault();
}

function onPointerUp(e) {
  if (activePointerId !== null && e.pointerId !== activePointerId) return;
  onUp(e);
}

function onPointerCancel(e) {
  if (activePointerId !== null && e.pointerId !== activePointerId) return;
  drag = null;
  activePointerId = null;
  lastTouchTap = null;
  canvas.style.cursor = 'default';
}

function onPointerLeave(e) {
  if (drag) return;
  const pointerType = e.pointerType || 'mouse';
  if (pointerType === 'mouse') canvas.style.cursor = 'default';
}

// Click: select or connect two neighboring pieces.
function handleClick(p) {
  if (selId === null) {
    selId = p.id;
    return;
  }
  if (selId === p.id) {
    selId = null;
    return;
  }
  const prev = pieces.find(q => q.id === selId);
  if (!prev || prev.groupId === p.groupId) {
    selId = p.id;
    return;
  }
  const dr = p.row - prev.row, dc = p.col - prev.col;
  if (Math.abs(dr) + Math.abs(dc) === 1) {
    const gA = groups[prev.groupId], gB = groups[p.groupId];
    if (gA && gB && angDiff(gA.angle, gB.angle) <= SNAP_ANG) {
      mergeInto(prev.groupId, prev.id, p.groupId, p.id, dc, dr);
      snapAll(prev.groupId);
      selId = null;
      return;
    }
  }
  // Not connectable – just change selection
  selId = p.id;
}

function onWheel(e) {
  e.preventDefault();
  if (winState) return;
  const pos = cp(e);
  const p = pieceAt(pos.x, pos.y);
  if (!p) return;
  groups[p.groupId].angle += e.deltaY > 0 ? ROT_STEP : -ROT_STEP;
}

function onDblClick(e) {
  e.preventDefault();
  if (winState) return;
  const pos = cp(e);
  const p = pieceAt(pos.x, pos.y);
  if (!p) return;
  bringToTop(p.groupId);
  const g = groups[p.groupId];
  if (!g) return;
  /* Même orientation que l’image source (découpe tête en haut). */
  g.angle = 0;
  selId = null;
  snapAll(p.groupId);
}

// ═══════════════════════════════════════════════════════════
//  JIGSAW  (languettes mâle / femelle complémentaires)
// ═══════════════════════════════════════════════════════════
function generateTabs() {
  tabR = []; tabD = [];
  for (let r = 0; r < gridRows; r++) {
    tabR[r] = [];
    for (let c = 0; c < gridCols - 1; c++)
      tabR[r][c] = Math.random() < 0.5 ? 1 : -1;
  }
  for (let r = 0; r < gridRows - 1; r++) {
    tabD[r] = [];
    for (let c = 0; c < gridCols; c++)
      tabD[r][c] = Math.random() < 0.5 ? 1 : -1;
  }
}

/**
 * Ajoute un côté au path : tab = 0 plat, +1 bosse (mâle), -1 encoche (femelle).
 * (nx,ny) normale unitaire pointant vers l'extérieur de la pièce.
 */
function addJigsawSide(path, ax, ay, bx, by, nx, ny, tab) {
  if (!tab) {
    path.lineTo(bx, by);
    return;
  }
  const midx = (ax + bx) / 2, midy = (ay + by) / 2;
  const dx = bx - ax, dy = by - ay;
  const len = Math.hypot(dx, dy) || 1;
  const tx = dx / len, ty = dy / len;
  const ox = nx * tab, oy = ny * tab;
  const depth = len * TAB_DEPTH;
  const halfW = len * TAB_HALF_W;
  const p0x = midx - tx * halfW, p0y = midy - ty * halfW;
  const p3x = midx + tx * halfW, p3y = midy + ty * halfW;
  const c1x = p0x + ox * depth, c1y = p0y + oy * depth;
  const c2x = p3x + ox * depth, c2y = p3y + oy * depth;
  path.lineTo(p0x, p0y);
  path.bezierCurveTo(c1x, c1y, c2x, c2y, p3x, p3y);
  path.lineTo(bx, by);
}

/** Même lecture des tabs que buildPiecePath (pour bornes image / path). */
function pieceTabs(row, col) {
  return {
    topT:    row > 0             ? -tabD[row - 1][col] : 0,
    rightT:  col < gridCols - 1 ?  tabR[row][col]     : 0,
    bottomT: row < gridRows - 1 ?  tabD[row][col]     : 0,
    leftT:   col > 0             ? -tabR[row][col - 1] : 0
  };
}

/**
 * Rectangle en coords locales (centre = centre cellule) couvrant la pièce
 * y compris les languettes mâles — pour mapper la bonne zone de l’image source.
 */
function pieceImageBounds(row, col) {
  const h = PS / 2;
  /* Un peu plus que TAB_DEPTH : les Bézier dépassent légèrement les points de contrôle */
  const bump = PS * (TAB_DEPTH * 1.28 + TAB_HALF_W * 0.08);
  let minX = -h, maxX = h, minY = -h, maxY = h;
  const t = pieceTabs(row, col);
  if (t.topT > 0)    minY -= bump;
  if (t.rightT > 0)  maxX += bump;
  if (t.bottomT > 0) maxY += bump;
  if (t.leftT > 0)   minX -= bump;
  return { minX, maxX, minY, maxY };
}

/** Path centré sur la pièce (origine = centre de la cellule). Sens horaire. */
function buildPiecePath(row, col) {
  const h = PS / 2;
  const t = pieceTabs(row, col);

  const path = new Path2D();
  path.moveTo(-h, -h);
  addJigsawSide(path, -h, -h,  h, -h,  0, -1, t.topT);
  addJigsawSide(path,  h, -h,  h,  h,  1,  0, t.rightT);
  addJigsawSide(path,  h,  h, -h,  h,  0,  1, t.bottomT);
  addJigsawSide(path, -h,  h, -h, -h, -1,  0, t.leftT);
  path.closePath();
  return path;
}

// ═══════════════════════════════════════════════════════════
//  TILE SLICING + découpe puzzle
// ═══════════════════════════════════════════════════════════
function buildTiles() {
  generateTabs();

  const pw = gridCols * PS;
  const ph = gridRows * PS;
  const tmp = document.createElement('canvas');
  tmp.width = pw;
  tmp.height = ph;
  const tctx = tmp.getContext('2d');

  const iw = srcImg.naturalWidth, ih = srcImg.naturalHeight;
  const crop = getCoverCropRect(iw, ih, gridCols, gridRows);
  tctx.drawImage(srcImg, crop.sx, crop.sy, crop.sw, crop.sh, 0, 0, pw, ph);

  const pad = JIG_PAD;
  const h = PS / 2;
  const cw = PS + 2 * pad;

  tiles = [];
  for (let r = 0; r < gridRows; r++) {
    tiles[r] = [];
    for (let c = 0; c < gridCols; c++) {
      const hitPath = buildPiecePath(r, c);
      const out = document.createElement('canvas');
      out.width = cw; out.height = cw;
      const o = out.getContext('2d');
      o.translate(pad + h, pad + h);
      o.save();
      o.clip(hitPath);
      // Étendre le morceau d’image au-delà du carré PS×PS pour remplir les languettes mâles
      const b = pieceImageBounds(r, c);
      let srcX = c * PS + h + b.minX;
      let srcY = r * PS + h + b.minY;
      const srcW = b.maxX - b.minX;
      const srcH = b.maxY - b.minY;
      const sx0 = Math.max(0, Math.min(pw, srcX));
      const sy0 = Math.max(0, Math.min(ph, srcY));
      const sx1 = Math.max(0, Math.min(pw, srcX + srcW));
      const sy1 = Math.max(0, Math.min(ph, srcY + srcH));
      const drwW = sx1 - sx0;
      const drwH = sy1 - sy0;
      if (drwW > 0 && drwH > 0) {
        const dstX = b.minX + (sx0 - srcX);
        const dstY = b.minY + (sy0 - srcY);
        o.drawImage(tmp, sx0, sy0, drwW, drwH, dstX, dstY, drwW, drwH);
      }
      o.restore();
      o.strokeStyle = 'rgba(0,0,0,.22)';
      o.lineWidth = 1;
      o.stroke(hitPath);
      out._hitPath = hitPath;
      tiles[r][c] = out;
    }
  }
}

// ═══════════════════════════════════════════════════════════
//  SCATTER  (create fresh pieces + groups, random positions)
// ═══════════════════════════════════════════════════════════
function scatter() {
  pieces = []; groups = {}; gidSeq = 0;
  selId = null; drag = null; flashes = [];
  const margin = PS * 0.5 + JIG_PAD + 24;
  const ANGLES  = [0, Math.PI/2, Math.PI, 3*Math.PI/2];
  for (let r = 0; r < gridRows; r++) {
    for (let c = 0; c < gridCols; c++) {
      const pid = r * gridCols + c;
      const piece = { id: pid, row: r, col: c, groupId: null };
      pieces.push(piece);
      const gid = gidSeq++;
      const x = margin + Math.random() * (W - 2 * margin);
      const y = margin + Math.random() * (H - 2 * margin);
      const angle = ANGLES[Math.floor(Math.random() * 4)];
      groups[gid] = { id: gid, x, y, angle, members: [{ pid, lx: 0, ly: 0 }] };
      piece.groupId = gid;
    }
  }
}

// ═══════════════════════════════════════════════════════════
//  GAME LIFECYCLE
// ═══════════════════════════════════════════════════════════
function p2pGameViewportChromeHeight() {
  const tb = document.getElementById('toolbar');
  return tb ? tb.offsetHeight : 0;
}
function p2pGameStageResize() {
  if (!canvas) return;
  const stage = document.getElementById('gameStage');
  if (stage) {
    W = canvas.width = Math.max(1, stage.clientWidth);
    H = canvas.height = Math.max(1, stage.clientHeight);
  } else {
    W = canvas.width = window.innerWidth;
    H = canvas.height = Math.max(1, window.innerHeight - p2pGameViewportChromeHeight());
  }
}
window.p2pNotifyGameLayout = function () {
  if (!canvas) return;
  p2pGameStageResize();
  const gameEl = document.getElementById('game');
  if (gameEl && gameEl.style.display === 'flex' && tiles.length) {
    applyPieceSizeFromViewport(true);
    buildTiles();
  }
};

function startGame() {
  updateToolTitle();
  document.getElementById('setup').style.display = 'none';
  document.getElementById('game').style.display = 'flex';

  canvas = document.getElementById('canvas');
  ctx    = canvas.getContext('2d');

  function resizeCanvas() {
    p2pGameStageResize();
  }

  function onWindowResize() {
    resizeCanvas();
    const c = document.getElementById('winCelebration');
    if (c && c.classList.contains('on')) {
      resizeFireworksCanvas();
      if ((scenario.winEffect === 'minimal' || scenario.winEffectEnabled === false) && fwCtx && fwCanvas) {
        fwCtx.fillStyle = 'rgba(11,11,23,.92)';
        fwCtx.fillRect(0, 0, fwCanvas.width, fwCanvas.height);
      }
    }
    const inGame = document.getElementById('game').style.display === 'flex';
    if (inGame && canvas && tiles.length) {
      applyPieceSizeFromViewport(true);
      buildTiles();
    }
  }

  // Wait one frame so flex layout has resolved, then measure
  requestAnimationFrame(() => {
    if (window.p2pTryFillGameAd) window.p2pTryFillGameAd();
    resizeCanvas();
    if (!windowResizeBound) {
      windowResizeBound = true;
      window.addEventListener('resize', onWindowResize);
    }

    syncGridFromScenario();
    applyPieceSizeFromViewport(false);
    buildTiles();
    scatter();
    updateHUD();

    if (!canvasListenersBound) {
      canvasListenersBound = true;
      canvas.addEventListener('pointerdown', onPointerDown, { passive: false });
      canvas.addEventListener('pointermove', onPointerMove, { passive: false });
      canvas.addEventListener('pointerup', onPointerUp, { passive: false });
      canvas.addEventListener('pointercancel', onPointerCancel);
      canvas.addEventListener('lostpointercapture', onPointerCancel);
      canvas.addEventListener('pointerleave', onPointerLeave);
      canvas.addEventListener('dblclick',   onDblClick);
      canvas.addEventListener('wheel',      onWheel, { passive: false });
      canvas.addEventListener('contextmenu', e => e.preventDefault());
    }

    cancelAnimationFrame(rafId);
    loop();
  });
}

function restartGame() {
  winState = false;
  stopAllWinEffects();
  const cel = document.getElementById('winCelebration');
  cel.classList.remove('on', 'win-effect-minimal', 'win-effect-off');
  cel.setAttribute('aria-hidden', 'true');
  if (canvas) p2pGameStageResize();
  syncGridFromScenario();
  applyPieceSizeFromViewport(false);
  buildTiles();
  scatter();
  updateHUD();
  cancelAnimationFrame(rafId);
  loop();
}

function newPuzzle() {
  winState = false;
  cancelAnimationFrame(rafId);
  stopAllWinEffects();
  const cel = document.getElementById('winCelebration');
  cel.classList.remove('on', 'win-effect-minimal', 'win-effect-off');
  cel.setAttribute('aria-hidden', 'true');
  document.getElementById('game').style.display = 'none';
  document.getElementById('setup').style.display = 'flex';
  if (shareLoadId) {
    try {
      window.history.replaceState({}, '', window.location.pathname + window.location.hash);
    } catch (e) {}
    shareLoadId = null;
    scenario = defaultScenario();
    syncFormFromScenario();
    syncOccasionSelectionsFromCurrentFields();
    clearLocalImage();
    const sr = document.getElementById('shareResult');
    if (sr) { sr.classList.remove('on'); }
    const sri = document.getElementById('shareResultInput');
    if (sri) sri.value = '';
  } else {
    const prev = document.getElementById('preview');
    if (srcImg && srcImg.src && previewObjectUrl) {
      prev.src = previewObjectUrl;
      prev.hidden = false;
    } else if (srcImg && srcImg.src) {
      prev.src = srcImg.src;
      prev.hidden = false;
    }
  }
  updateBuilderPreviews();
  if (creationMode === 'guided')
    requestAnimationFrame(() => positionGuidedFloatingPanel());
}

// ═══════════════════════════════════════════════════════════
//  SETUP UI — dépôt fichier, partage, chargement ?s=
// ═══════════════════════════════════════════════════════════
function setSetupError(msg) {
  const el = document.getElementById('setupError');
  if (el) el.textContent = msg || '';
}

function onLocalStartClick() {
  setSetupError('');
  readFormToScenario();
  if (!imageReady || !srcImg) {
    setSetupError(t('errors.needImage'));
    return;
  }
  startGame();
}

async function onShareLinkClick() {
  setSetupError('');
  readFormToScenario();
  if (!selectedImageFile) {
    setSetupError(t('errors.needLocalImage'));
    return;
  }
  const err = validateImageFile(selectedImageFile);
  if (err) {
    setSetupError(err);
    return;
  }
  const fd = new FormData();
  fd.append('meta', JSON.stringify(metaForUpload()));
  fd.append('image', selectedImageFile, selectedImageFile.name || 'puzzle.jpg');
  const btn = document.getElementById('btnShareLink');
  const loading = document.getElementById('shareLoading');
  const initialBtnLabel = btn ? btn.textContent : '';
  if (btn) {
    btn.disabled = true;
    btn.classList.add('is-loading');
    btn.textContent = t('share.generatingBtn');
    btn.setAttribute('aria-busy', 'true');
  }
  if (loading) loading.classList.add('on');
  try {
    const res = await fetch('/api/create-scenario', { method: 'POST', body: fd });
    const data = await res.json().catch(() => ({}));
    if (!res.ok) {
      setSetupError(messageForApiError(res.status, data));
      return;
    }
    const box = document.getElementById('shareResult');
    const inp = document.getElementById('shareResultInput');
    if (data.shareUrl && inp) {
      inp.value = data.shareUrl;
      box && box.classList.add('on');
    }
  } catch (e) {
    setSetupError(t('errors.network'));
  } finally {
    if (btn) {
      btn.disabled = false;
      btn.classList.remove('is-loading');
      btn.textContent = initialBtnLabel || t('setup.btnShareLink');
      btn.removeAttribute('aria-busy');
    }
    if (loading) loading.classList.remove('on');
  }
}

function onCopyShareClick() {
  const inp = document.getElementById('shareResultInput');
  if (!inp || !inp.value) return;
  inp.select();
  document.execCommand('copy');
}

function openShareGateLoading() {
  const gate = document.getElementById('shareGate');
  const setup = document.getElementById('setup');
  const errEl = document.getElementById('shareGateError');
  const startBtn = document.getElementById('btnShareStart');
  if (startBtn) startBtn.disabled = true;
  if (setup) setup.style.display = 'none';
  if (gate) {
    gate.classList.add('on');
    gate.setAttribute('aria-hidden', 'false');
  }
  applyShareGateTextsToDom();
  if (errEl) errEl.textContent = t('shareGate.loading');
}

function hideShareGate() {
  const gate = document.getElementById('shareGate');
  if (gate) {
    gate.classList.remove('on');
    gate.setAttribute('aria-hidden', 'true');
  }
  const errEl = document.getElementById('shareGateError');
  if (errEl) errEl.textContent = '';
}

function initDropZone() {
  const zone = document.getElementById('dropZone');
  const input = document.getElementById('fileInput');
  const browse = document.getElementById('btnBrowse');
  if (!zone || !input) return;

  function pickFromList(files) {
    const f = files && files[0];
    if (!f) return;
    assignImageFromFile(f, (err) => setSetupError(err));
  }

  if (browse && input) {
    browse.addEventListener('click', (e) => { e.stopPropagation(); input.click(); });
  }
  if (zone && input) {
    zone.addEventListener('click', () => input.click());
    zone.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' || e.key === ' ') {
        e.preventDefault();
        input.click();
      }
    });
  }
  input.addEventListener('change', () => pickFromList(input.files));

  ['dragenter', 'dragover'].forEach((ev) => {
    zone.addEventListener(ev, (e) => {
      e.preventDefault();
      e.stopPropagation();
      zone.classList.add('dragover');
    });
  });
  ['dragleave', 'drop'].forEach((ev) => {
    zone.addEventListener(ev, (e) => {
      e.preventDefault();
      e.stopPropagation();
      zone.classList.remove('dragover');
    });
  });
  zone.addEventListener('drop', (e) => pickFromList(e.dataTransfer && e.dataTransfer.files));
}

function initBuilderPreviewListeners() {
  ['inputShareGateTitle', 'textareaShareGateBody', 'inputToolTitle', 'textareaWinText', 'selectWinEffect', 'checkWinEffectEnabled', 'selectWinFont', 'inputWinColor', 'checkWinGradient', 'inputGridCols', 'inputGridRows'].forEach((id) => {
    const el = document.getElementById(id);
    if (!el) return;
    el.addEventListener('input', updateBuilderPreviews);
    el.addEventListener('change', updateBuilderPreviews);
  });
}

function backToBuilderFromShareError(message) {
  try {
    window.history.replaceState({}, '', window.location.pathname + window.location.hash);
  } catch (e) {}
  shareLoadId = null;
  hideShareGate();
  const setup = document.getElementById('setup');
  if (setup) setup.style.display = 'flex';
  setSetupError(message || '');
  if (creationMode === 'guided' || creationMode === 'uxwalk')
    requestAnimationFrame(() => setGuidedStep(guidedStepIndex));
}

async function loadSharedScenario(id) {
  openShareGateLoading();
  const errEl = document.getElementById('shareGateError');
  try {
    const res = await fetch('/api/scenario/' + encodeURIComponent(id));
    const data = await res.json().catch(() => ({}));
    if (!res.ok) {
      backToBuilderFromShareError(messageForApiError(res.status, data));
      return;
    }
    shareLoadId = id;
    applyScenarioPayload(data);
    const url = data.imageUrl;
    if (!url) {
      backToBuilderFromShareError(t('errors.scenarioNoImage'));
      return;
    }
    const startBtn = document.getElementById('btnShareStart');
    if (startBtn) startBtn.disabled = true;
    assignImageFromUrl(url, (err) => {
      if (err) {
        backToBuilderFromShareError(err);
        return;
      }
      if (errEl) errEl.textContent = '';
      if (startBtn) startBtn.disabled = false;
    });
  } catch (e) {
    backToBuilderFromShareError(t('errors.scenarioNetwork'));
  }
}

function onShareStartClick() {
  if (!imageReady || !srcImg) return;
  hideShareGate();
  startGame();
}

async function bootstrapApp() {
  I18N_LANG = resolveInitialLang();
  let d = await loadI18nDict(I18N_LANG);
  if (!d) d = await loadI18nDict('fr');
  I18N_DICT = d || {};
  scenario = defaultScenario();
  applyI18nDom();
  updateLangSwitchUi();

  const btnLf = document.getElementById('btnLangFr');
  const btnLe = document.getElementById('btnLangEn');
  if (btnLf) btnLf.addEventListener('click', () => setAppLang('fr'));
  if (btnLe) btnLe.addEventListener('click', () => setAppLang('en'));

  document.getElementById('btnRestart').addEventListener('click', restartGame);
  document.getElementById('winReplay').addEventListener('click', restartGame);
  document.getElementById('winNew').addEventListener('click', newPuzzle);
  document.getElementById('btnStartGame').addEventListener('click', onLocalStartClick);
  document.getElementById('btnShareLink').addEventListener('click', onShareLinkClick);
  document.getElementById('btnCopyShare').addEventListener('click', onCopyShareClick);
  document.getElementById('btnShareStart').addEventListener('click', onShareStartClick);

  document.addEventListener('keydown', (e) => {
    if (creationMode !== 'uxwalk') return;
    const setup = document.getElementById('setup');
    if (!setup || getComputedStyle(setup).display === 'none') return;
    const tgt = e.target;
    if (
      tgt &&
      (tgt.tagName === 'INPUT' ||
        tgt.tagName === 'TEXTAREA' ||
        tgt.tagName === 'SELECT' ||
        tgt.isContentEditable)
    )
      return;
    if (e.key === 'ArrowLeft' && guidedStepIndex > 0) {
      e.preventDefault();
      setGuidedStep(guidedStepIndex - 1);
    } else if (e.key === 'ArrowRight' && guidedStepIndex < BUILDER_STEP_COUNT - 1) {
      e.preventDefault();
      setGuidedStep(guidedStepIndex + 1);
    }
  });

  const btnUxWalkPrev = document.getElementById('btnUxWalkPrev');
  const btnUxWalkNext = document.getElementById('btnUxWalkNext');
  if (btnUxWalkPrev)
    btnUxWalkPrev.addEventListener('click', () => {
      if (guidedStepIndex > 0) setGuidedStep(guidedStepIndex - 1);
    });
  if (btnUxWalkNext)
    btnUxWalkNext.addEventListener('click', () => {
      if (guidedStepIndex < BUILDER_STEP_COUNT - 1) setGuidedStep(guidedStepIndex + 1);
    });
  const btnUxDevicePhone = document.getElementById('btnUxDevicePhone');
  const btnUxDeviceDesktop = document.getElementById('btnUxDeviceDesktop');
  if (btnUxDevicePhone)
    btnUxDevicePhone.addEventListener('click', () => {
      setUxWalkDevice('phone');
    });
  if (btnUxDeviceDesktop)
    btnUxDeviceDesktop.addEventListener('click', () => {
      setUxWalkDevice('desktop');
    });

  syncFormFromScenario();
  ensureGoogleFont('system');
  initBuilderPreviewListeners();
  initOccasionCapsules();
  initPreviewClickToEdit();
  initGuidedPanelDrag();
  initDropZone();
  setUxWalkDevice('desktop');
  setCreationMode('uxwalk');
  const previewImgEl = document.getElementById('preview');
  if (previewImgEl) previewImgEl.addEventListener('load', updateBuilderPreviews);
  updateBuilderPreviews();
  applyShareGateTextsToDom();

  const sid = getQueryScenarioId();
  if (sid) await loadSharedScenario(sid);
}

bootstrapApp();
</script>
